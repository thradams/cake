<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDE</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #1e1e1e;
            --bg-dark: #141414;
            --bg-sidebar: #252526;
            --bg-toolbar: #333333;
            --bg-tab: #2d2d2d;
            --bg-tab-act: #1e1e1e;
            --bg-panel: #1e1e1e;
            --bg-status: #007acc;
            --border: #3c3c3c;
            --text: #d4d4d4;
            --text-dim: #858585;
            --text-bright: #ffffff;
            --accent: #007acc;
            --err: #f14c4c;
            --warn: #cca700;
            --ok: #89d185;
            --sidebar-w: 220px;
        }

        html, body {
            height: 100%;
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
            font-size: 13px;
            overflow: hidden;
        }

        /* ── ACTIVITY BAR ── */
        #activity-bar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 22px;
            width: 48px;
            background: #2c2c2c;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 6px;
            gap: 2px;
            z-index: 200;
        }

        .activity-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 18px;
            border: none;
            background: transparent;
            transition: color 0.15s, background 0.15s;
            position: relative;
        }

            .activity-btn:hover {
                color: var(--text-bright);
                background: rgba(255,255,255,0.06);
            }

            .activity-btn.active {
                color: var(--text-bright);
            }

                .activity-btn.active::before {
                    content: '';
                    position: absolute;
                    left: -6px;
                    top: 6px;
                    bottom: 6px;
                    width: 3px;
                    background: var(--accent);
                    border-radius: 0 2px 2px 0;
                }

        /* ── SIDEBAR ── */
        #sidebar {
            position: fixed;
            top: 0;
            left: 48px;
            bottom: 22px;
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 190;
            transition: width 0.18s ease;
            overflow: hidden;
        }

            #sidebar.collapsed {
                width: 0;
                border-right: none;
            }

        .sidebar-header {
            padding: 10px 14px 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #panel-pin-btn {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.12s, color 0.12s;
            flex-shrink: 0;
        }

            #panel-pin-btn:hover {
                background: rgba(255,255,255,0.08);
                color: var(--text-bright);
            }

            #panel-pin-btn.pinned {
                color: var(--text-bright);
            }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

            #file-tree::-webkit-scrollbar {
                width: 6px;
            }

            #file-tree::-webkit-scrollbar-thumb {
                background: #444;
                border-radius: 3px;
            }

        .tree-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text);
            font-size: 13px;
            border-left: 2px solid transparent;
            transition: background 0.1s;
        }

            .tree-item:hover {
                background: rgba(255,255,255,0.05);
            }

            .tree-item.active {
                background: rgba(0,122,204,0.15);
                border-left-color: var(--accent);
                color: var(--text-bright);
            }

            .tree-item .file-icon {
                font-size: 13px;
                flex-shrink: 0;
            }

            .tree-item .file-name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 12.5px;
            }

            .tree-item .dirty-dot {
                width: 7px;
                height: 7px;
                background: var(--text-dim);
                border-radius: 50%;
                flex-shrink: 0;
                display: none;
            }

            .tree-item.dirty .dirty-dot {
                display: block;
            }

        /* ── MAIN AREA ── */
        #main-area {
            position: fixed;
            top: 0;
            left: calc(48px + var(--sidebar-w));
            right: 0;
            bottom: 22px;
            display: flex;
            flex-direction: column;
            transition: left 0.18s ease;
        }

            #main-area.sidebar-collapsed {
                left: 48px;
            }

        /* ── TAB BAR ── */
        #tab-bar {
            height: 35px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            flex-shrink: 0;
            position: relative;
            overflow: visible;
        }

        #tabs-list {
            display: flex;
            align-items: stretch;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

            #tabs-list::-webkit-scrollbar {
                display: none;
            }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px 0 12px;
            background: var(--bg-tab);
            border-right: 1px solid var(--border);
            cursor: pointer;
            font-size: 12.5px;
            color: var(--text-dim);
            min-width: 120px;
            max-width: 200px;
            white-space: nowrap;
            transition: background 0.1s, color 0.1s;
            user-select: none;
            flex-shrink: 0;
        }

            .tab:hover {
                background: #323232;
                color: var(--text);
            }

            .tab.active {
                background: var(--bg-tab-act);
                color: var(--text-bright);
                border-top: 1.5px solid var(--accent);
            }

            .tab .tab-icon {
                font-size: 12px;
            }

            .tab .tab-name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .tab .tab-dirty {
                width: 8px;
                height: 8px;
                background: var(--text-dim);
                border-radius: 50%;
                flex-shrink: 0;
                opacity: 0;
                transition: opacity 0.2s;
            }

            .tab.dirty .tab-dirty {
                opacity: 1;
            }

        /* ── ACTION BAR ── */
        #action-bar {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1px;
            padding: 0 6px;
            background: var(--bg-toolbar);
            overflow: visible;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.12s, color 0.12s;
            position: relative;
        }

            .icon-btn:hover:not(:disabled) {
                background: rgba(255,255,255,0.08);
                color: var(--text-bright);
            }

            .icon-btn:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

        /* tooltip */


        .v-sep {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 4px;
            flex-shrink: 0;
        }

        #diagCounter {
            font-size: 11px;
            color: var(--text-dim);
            min-width: 30px;
            text-align: center;
            user-select: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ── EDITOR (Monaco) ── */
        #editor-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        #monaco-editor {
            flex: 1;
            min-height: 0;
            width: 100%;
        }

        /* ── PANEL ── */
        #panel {
            display: flex;
            flex-direction: column;
            flex: 0 0 180px;
            min-height: 50px;
            border-top: 1px solid var(--border);
        }

        #resize-handle {
            height: 4px;
            background: transparent;
            cursor: ns-resize;
            flex-shrink: 0;
            order: -1;
            transition: background 0.15s;
        }

            #resize-handle:hover {
                background: var(--accent);
            }

        #panel-header {
            display: flex;
            align-items: center;
            background: #252526;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            height: 28px;
        }

        .panel-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 100%;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

            .panel-tab.active {
                color: var(--text-bright);
                border-bottom-color: var(--accent);
            }

        .panel-badge {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 10px;
            font-weight: 700;
            background: var(--err);
            color: #fff;
        }

            .panel-badge.warn {
                background: var(--warn);
            }

        #panel-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            padding-right: 6px;
        }

        #panel.collapsed {
            flex: none !important;
            height: 28px !important;
            min-height: 28px;
            overflow: hidden;
        }

            #panel.collapsed #output {
                display: none;
            }

            #panel.collapsed #resize-handle {
                display: none;
            }

        #panel-toggle-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.12s, color 0.12s;
            margin-right: 2px;
        }

            #panel-toggle-btn:hover {
                background: rgba(255,255,255,0.08);
                color: var(--text-bright);
            }

        #output {
            background: var(--bg-panel);
            color: var(--text);
            padding: 8px 14px;
            font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            overflow: auto;
            white-space: pre;
            flex: 1;
            line-height: 1.45;
        }

            #output::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }

            #output::-webkit-scrollbar-thumb {
                background: #444;
                border-radius: 4px;
            }

        /* ── STATUS BAR ── */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 22px;
            background: var(--bg-status);
            display: flex;
            align-items: center;
            z-index: 300;
            font-size: 11.5px;
            color: rgba(255,255,255,0.9);
            user-select: none;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            height: 100%;
            cursor: default;
            transition: background 0.1s;
            white-space: nowrap;
            font-size: 11.5px;
        }

            .status-item:hover {
                background: rgba(255,255,255,0.12);
            }

            .status-item.right {
                margin-left: auto;
            }

        #status-msg {
            flex: 1;
            text-align: right;
            padding-right: 10px;
            font-size: 11px;
            opacity: 0.85;
            transition: opacity 1s;
            pointer-events: none;
        }

            #status-msg.fade {
                opacity: 0;
            }

            #status-msg.error {
                color: #ff5f5f;
                opacity: 1;
                font-weight: 600;
            }

        #status-bar.error {
            background: #c0392b !important;
        }

        #status-bar {
            transition: background 0.2s ease;
        }

        /* ── OUTPUT PANEL DIAGNOSTICS ── */
        .output-diag {
            display: block;
            cursor: pointer;
            border-left: 3px solid transparent;
            padding-left: 4px;
            margin-left: -4px;
        }

            .output-diag:hover {
                background: rgba(255,255,255,.05);
                border-left-color: #555;
            }

            .output-diag.selected {
                background: rgba(86,156,214,.15);
                border-left-color: #569cd6;
            }

        .output-line {
            display: block;
        }

        /* ── INLINE EDITOR DIAGNOSTICS (Monaco after-line decorations) ── */
        .diag-inline-error {
            color: #ff5555;
            font-style: italic;
            opacity: 0.85;
        }

        .diag-inline-warning {
            color: #f1c40f;
            font-style: italic;
            opacity: 0.85;
        }

        .diag-inline-note {
            color: #9cdcfe;
            font-style: italic;
            opacity: 0.85;
        }

        /* Syntax highlighting and find handled by Monaco */
    </style>
</head>
<body>

    <!-- Hidden compat input -->
    <input id="pathInput" type="hidden" value="" />
    <!-- Hidden select for compat with main.js -->
    <select id="fileList" style="display:none" onchange="onFileSelect()">
        <option value="">-- files --</option>
    </select>

    <!-- Activity Bar -->
    <div id="activity-bar">
        <button class="activity-btn active" id="btn-explorer" onclick="toggleSidebar()" title="Explorer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            Explorer<button id="panel-pin-btn" onclick="togglePanelPin()" title="Pin open (prevent auto-close)">
                <svg id="pin-icon-auto" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="Auto-close: sidebar closes on file select">
                    <!-- open lock -->
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 9.9-1" />
                </svg>
                <svg id="pin-icon-pinned" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="Pinned: sidebar stays open" style="display:none">
                    <!-- closed lock -->
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
            </button>
        </div>
        <div id="file-tree"></div>
    </div>

    <!-- Main Area -->
    <div id="main-area">

        <!-- Tab Bar -->
        <div id="tab-bar">
            <div id="tabs-list"></div>
            <div id="action-bar">
                <button class="icon-btn" id="reloadBtn" onclick="reload()" title="Reload" style="width:auto;padding:0 10px;" disabled>Reload</button>
                <button class="icon-btn" id="saveBtn" onclick="saveFile()" title="Save (Ctrl+S)" style="width:auto;padding:0 10px;" disabled>Save</button>
                <button class="icon-btn" id="saveCompileBtn" onclick="compile()" title="Save &amp; Compile (Ctrl+Enter)" style="width:auto;padding:0 10px;">Save &amp; Compile</button>
                <div class="v-sep"></div>
                <button class="icon-btn" onclick="diagFirst()" title="First diagnostic (Ctrl+Home)" style="width:auto;padding:0 8px;">First</button>
                <button class="icon-btn" onclick="diagPrev()" title="Previous diagnostic (Ctrl+↑ or Shift+F8)" style="width:auto;padding:0 8px;">Prev</button>
                <span id="diagCounter"></span>
                <button class="icon-btn" onclick="diagNext()" title="Next diagnostic (Ctrl+↓ or F8)" style="width:auto;padding:0 8px;">Next</button>
                <button class="icon-btn" onclick="diagLast()" title="Last diagnostic (Ctrl+End)" style="width:auto;padding:0 8px;">Last</button>
            </div>
        </div>

        <!-- Editor + Panel -->
        <div id="editor-container">
            <!-- Monaco Editor -->
            <div id="monaco-editor"></div>

            <!-- Output Panel -->
            <div id="panel">
                <div id="resize-handle"></div>
                <div id="panel-header">
                    <div class="panel-tab active">
                        Output
                        <span id="err-badge" class="panel-badge" style="display:none"></span>
                        <span id="warn-badge" class="panel-badge warn" style="display:none"></span>
                    </div>
                    <div id="panel-actions">
                        <button id="panel-toggle-btn" onclick="togglePanel()" title="Collapse / Expand panel">&#9660;</button>
                        <button class="icon-btn" onclick="document.getElementById('output').innerHTML=''" title="Clear">&#10005;</button>
                    </div>
                </div>
                <pre id="output"></pre>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
        <div class="status-item">&#9654; IDE</div>
        <div class="status-item" id="status-file">No file open</div>
        <span id="status-msg"></span>
        <div class="status-item right" id="status-cursor">Ln 1, Col 1</div>
        <div class="status-item">C</div>
    </div>

    <script src="./vs/loader.js"></script>
    <script src="server.js"></script>
    <script>
        // ── Monaco bootstrap ──────────────────────────────────────────
        require.config({ paths: { vs: './vs' } });
        let _monacoEditor = null;
        let _monacoReady = false;
        let _pendingValue = null;

        require(['vs/editor/editor.main'], function ()
        {
            _monacoEditor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: '',
                language: 'c',
                theme: 'vs-dark',
                fontSize: 13,
                fontFamily: "'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace",
                lineHeight: 19.5,
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                automaticLayout: true,
                renderWhitespace: 'none',
                folding: true,
                glyphMargin: true,
                fixedOverflowWidgets: true,
            });

            // Apply VS Code dark theme colours that match the existing palette
            monaco.editor.defineTheme('ide-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: '569cd6' },
                    { token: 'keyword.annotation', foreground: 'c586c0' },
                    { token: 'string', foreground: 'ce9178' },
                    { token: 'comment', foreground: '6a9955' },
                    { token: 'comment.lint', foreground: 'e8a838', fontStyle: 'italic' },
                    { token: 'number', foreground: 'b5cea8' },
                    { token: 'type', foreground: '4ec9b0' },
                    { token: 'identifier', foreground: 'd4d4d4' },
                ],
                colors: {
                    'editor.background': '#1e1e1e',
                    'editor.foreground': '#d4d4d4',
                    'editorLineNumber.foreground': '#454545',
                    'editorLineNumber.activeForeground': '#c6c6c6',
                    'editor.lineHighlightBackground': '#2a2a2a',
                    'editorGutter.background': '#1e1e1e',
                    'editor.selectionBackground': '#264f78',
                    'editor.inactiveSelectionBackground': '#3a3d41',
                    'editorCursor.foreground': '#ffffffbb',
                }
            });
            monaco.editor.setTheme('ide-dark');

            // ── Custom tokenizer: //lint comments + extra keywords ────
            monaco.languages.setMonarchTokensProvider('c', {
                defaultToken: '',
                tokenPostfix: '.c',
                keywords: [
                    'auto', 'break', 'case', 'char', 'const', 'continue', 'default', 'do',
                    'double', 'else', 'enum', 'extern', 'float', 'for', 'goto', 'if', 'inline',
                    'int', 'long', 'register', 'restrict', 'return', 'short', 'signed', 'sizeof',
                    'static', 'struct', 'switch', 'typedef', 'union', 'unsigned', 'void',
                    'volatile', 'while', '_Bool', '_Complex', '_Imaginary',
                    // added keywords
                    '_Countof', '_Static_assert', '_Alignof', '_Alignas', '_Noreturn',
                ],
                operators: [
                    '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
                    '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
                    '<<', '>>', '>>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=',
                    '%=', '<<=', '>>=', '>>>=',
                ],
                symbols: /[=><!~?:&|+\-*\/\^%]+/,
                escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
                tokenizer: {
                    root: [
                        // //lint … line comments — must come before generic //
                        [/\/\/lint\b.*$/, 'comment.lint'],
                        // generic // comment
                        [/\/\/.*$/, 'comment'],
                        // /* block comment */
                        [/\/\*/, 'comment', '@comment'],
                        // preprocessor
                        [/^\s*#\w+/, 'keyword'],
                        // identifiers / keywords
                        [/_Countof|_Static_assert|_Alignof|_Alignas|_Noreturn/, 'keyword'],
                        [/[a-zA-Z_]\w*/, {
                            cases: {
                                '@keywords': 'keyword',
                                '@default': 'identifier',
                            }
                        }],
                        // whitespace
                        { include: '@whitespace' },
                        // numbers
                        [/\d*\.\d+([eE][\-+]?\d+)?[fFlL]?/, 'number.float'],
                        [/0[xX][0-9a-fA-F]+[uUlL]*/, 'number.hex'],
                        [/\d+[uUlL]*/, 'number'],
                        // strings
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/, 'string', '@string'],
                        // characters
                        [/'[^\\']'/, 'string'],
                        [/(')(@escapes)(')/, ['string', 'string.escape', 'string']],
                        [/'/, 'string.invalid'],
                        // delimiters
                        [/[{}()\[\]]/, '@brackets'],
                        [/[<>](?!@symbols)/, '@brackets'],
                        [/@symbols/, {
                            cases: {
                                '@operators': 'operator',
                                '@default': '',
                            }
                        }],
                        [/[;,.]/, 'delimiter'],
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\*\//, 'comment', '@pop'],
                        [/[\/*]/, 'comment'],
                    ],
                    string: [
                        [/[^\\"]+/, 'string'],
                        [/@escapes/, 'string.escape'],
                        [/\\./, 'string.escape.invalid'],
                        [/"/, 'string', '@pop'],
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, 'white'],
                    ],
                },
            });
            // ─────────────────────────────────────────────────────────

            _monacoReady = true;
            if (_pendingValue !== null)
            {
                _setEditorValue(_pendingValue);
                _pendingValue = null;
            }
            // Apply any diagnostics that arrived before Monaco was ready
            if (lastMessages && lastMessages.length) _applyDiagsToMonaco(lastMessages);

            // cursor position → status bar
            _monacoEditor.onDidChangeCursorPosition(e =>
            {
                document.getElementById('status-cursor').textContent =
                    `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });

            // dirty tracking + hide stale inline annotations on any edit
            _monacoEditor.onDidChangeModelContent(() =>
            {
                if (window.currentFile) setTabDirty(window.currentFile, true);
                if (_diagWidgets.length) _clearDiagWidgets();
            });
        });

        // Compat shim: server.js reads/writes via document.getElementById('c-editor').value
        // We intercept those calls by keeping a hidden textarea in sync via property override.
        (function shimEditorElement()
        {
            const fake = document.createElement('textarea');
            fake.id = 'c-editor';
            fake.style.display = 'none';
            document.body.appendChild(fake);

            // Override .value getter/setter so server.js reads/writes go through Monaco
            Object.defineProperty(fake, 'value', {
                get()
                {
                    return _monacoEditor ? _monacoEditor.getValue() : '';
                },
                set(v)
                {
                    _setEditorValue(v);
                }
            });
        })();

        function _setEditorValue(v)
        {
            if (!_monacoReady) { _pendingValue = v; return; }
            _monacoEditor.setValue(v);
            _monacoEditor.setScrollPosition({ scrollTop: 0, scrollLeft: 0 });
        }

        // ── Compat stubs server.js calls ─────────────────────────────
        // updateGutter, scheduleHighlight, updateHighlight — Monaco handles these
        function updateGutter() { }
        function scheduleHighlight() { }
        function updateHighlight() { }

        // highlight.innerHTML used after compile to show diag annotations in the old code
        // We replicate that via Monaco markers instead
        const highlight = {
            get innerHTML() { return ''; },
            set innerHTML(v)
            {
                // parse diag spans from the HTML and push as Monaco markers
                _applyDiagsToMonaco(lastMessages);
            },
            scrollTop: 0,
            scrollLeft: 0,
            scrollHeight: 0,
            scrollWidth: 0,
            offsetWidth: 0,
            clientWidth: 0,
            clientHeight: 0,
            addEventListener() { }
        };

        // gutterInner shim (server.js references it)
        const gutterInner = { style: { transform: '' }, textContent: '' };

        // editor shim (server.js uses `editor` as a direct reference)
        const editor = document.getElementById('c-editor'); // the shim textarea

        function _applyDiagsToMonaco(messages)
        {
            if (!_monacoReady) return;
            const model = _monacoEditor.getModel();
            if (!model) return;

            // 1. Squiggles + gutter icons via markers
            const markers = messages.map(m => ({
                severity: m.severity === 'error' ? monaco.MarkerSeverity.Error
                    : m.severity === 'warning' ? monaco.MarkerSeverity.Warning
                        : monaco.MarkerSeverity.Info,
                message: m.text,
                startLineNumber: m.line,
                startColumn: 1,
                endLineNumber: m.line,
                endColumn: model.getLineMaxColumn(m.line) || 1,
            }));
            monaco.editor.setModelMarkers(model, 'cake', markers);

            // 2. Inline end-of-line hints via afterContentClassName decorations +
            //    a dynamic <style> tag that encodes the text into CSS ::after { content }.
            //    This approach works on all Monaco versions and scrolls with the editor
            //    because decorations are part of the line layout (unlike content widgets
            //    which are hoisted to the body by fixedOverflowWidgets:true).
            _clearDiagWidgets();

            // Group diagnostics by line number, preserving insertion order
            const byLine = new Map();
            messages.forEach(m =>
            {
                if (!byLine.has(m.line)) byLine.set(m.line, []);
                byLine.get(m.line).push(m);
            });

            const decorations = [];
            const cssRules = [];

            byLine.forEach((diags, lineNumber) =>
            {
                // Build one label per line: "  ⚠ msg1  ╎  ✖ msg2"
                const label = diags.map((m, j) =>
                {
                    const icon = m.severity === 'error' ? '\u2716' : m.severity === 'warning' ? '\u26a0' : '\u25cf';
                    return (j === 0 ? `  ${icon} ` : `  \u254e  ${icon} `) + m.text;
                }).join('');

                const hasError = diags.some(m => m.severity === 'error');
                const hasWarn = diags.some(m => m.severity === 'warning');
                const color = hasError ? '#ff5555' : hasWarn ? '#f1c40f' : '#9cdcfe';

                // Unique class per line so each ::after carries its own text
                const cls = `diag-hint-${lineNumber}`;

                // Escape the label for CSS string: backslash and double-quote only
                const cssText = label.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
                cssRules.push(`.${cls}::after { content: "${cssText}"; color: ${color}; font-style: italic; opacity: 0.85; white-space: pre; }`);

                const col = model.getLineMaxColumn(lineNumber);
                decorations.push({
                    range: new monaco.Range(lineNumber, col, lineNumber, col),
                    options: { afterContentClassName: cls }
                });
            });

            // Inject CSS
            _diagStyleEl.textContent = cssRules.join('\n');

            // Apply decorations (deltaDecorations works on all Monaco versions)
            _diagWidgets = _monacoEditor.deltaDecorations([], decorations);
        }

        // _diagWidgets: array of decoration IDs from deltaDecorations
        let _diagWidgets = [];
        // Persistent <style> element for ::after CSS rules
        const _diagStyleEl = document.createElement('style');
        _diagStyleEl.id = 'diag-hint-styles';
        document.head.appendChild(_diagStyleEl);

        function _clearDiagWidgets()
        {
            if (_diagWidgets.length)
            {
                _monacoEditor.deltaDecorations(_diagWidgets, []);
                _diagWidgets = [];
            }
            _diagStyleEl.textContent = '';
        }

        // Hook setDiagMessages so markers update whenever diags arrive
        const _origSetDiag = window.setDiagMessages || function () { };
        window.setDiagMessages = function (messages)
        {
            _origSetDiag(messages);
            _applyDiagsToMonaco(messages);
        };

        // isDirty — keep in sync; server.js writes to this global directly
        let _isDirty = false;
        Object.defineProperty(window, 'isDirty', {
            get() { return _isDirty; },
            set(v)
            {
                _isDirty = v;
                if (v && _monacoReady)
                {
                    _clearDiagWidgets();
                } else if (!v && _monacoReady)
                {
                    _applyDiagsToMonaco(lastMessages || []);
                }
            }
        });

        // ── file icon helper ──────────────────────────────────────────
        function getFileIcon(name)
        {
            if (name.endsWith('.c')) return '&#x1F1E8;';
            if (name.endsWith('.h')) return '&#x1F4C4;';
            if (name.endsWith('.cpp')) return '&#x2B21;';
            if (name.endsWith('.js')) return '&#x1F7E8;';
            return '&#x1F4C4;';
        }

        function updateStatusFile(f)
        {
            document.getElementById('status-file').textContent = f || 'No file open';
        }

        function updateStatusDiags(msgs)
        {
            const errors = msgs.filter(m => m.severity === 'error').length;
            const warnings = msgs.filter(m => m.severity === 'warning').length;
            const errB = document.getElementById('err-badge');
            const warnB = document.getElementById('warn-badge');
            errB.textContent = errors; errB.style.display = errors ? '' : 'none';
            warnB.textContent = warnings; warnB.style.display = warnings ? '' : 'none';
        }

        // ── panel pin & collapse ──────────────────────────────────────
        let _panelPinned = false;
        let _panelCollapsed = false;
        let _panelPinnedHeight = null;

        function togglePanelPin()
        {
            _panelPinned = !_panelPinned;
            const btn = document.getElementById('panel-pin-btn');
            btn.classList.toggle('pinned', _panelPinned);
            btn.title = _panelPinned ? 'Pinned: sidebar stays open' : 'Auto-close: sidebar closes on file select';
            document.getElementById('pin-icon-auto').style.display = _panelPinned ? 'none' : '';
            document.getElementById('pin-icon-pinned').style.display = _panelPinned ? '' : 'none';
            // If pinned while collapsed, expand it
            if (_panelPinned && _panelCollapsed) expandPanel();
        }

        function togglePanel()
        {
            if (_panelCollapsed) expandPanel();
            else collapsePanel();
        }

        function collapsePanel()
        {
            const panel = document.getElementById('panel');
            _panelPinnedHeight = panel.style.height || null;
            panel.classList.add('collapsed');
            _panelCollapsed = true;
            const btn = document.getElementById('panel-toggle-btn');
            btn.innerHTML = '&#9650;';
            btn.title = 'Expand panel';
            if (_monacoEditor) _monacoEditor.layout();
        }

        function expandPanel()
        {
            const panel = document.getElementById('panel');
            panel.classList.remove('collapsed');
            if (_panelPinnedHeight)
            {
                panel.style.flex = 'none';
                panel.style.height = _panelPinnedHeight;
            } else
            {
                panel.style.flex = '';
                panel.style.height = '';
            }
            _panelCollapsed = false;
            const btn = document.getElementById('panel-toggle-btn');
            btn.innerHTML = '&#9660;';
            btn.title = 'Collapse panel';
            if (_monacoEditor) _monacoEditor.layout();
        }

        // Auto-close the panel after compile unless pinned
        function autoCollapsePanel()
        {
            if (!_panelPinned) collapsePanel();
        }

        // ── sidebar toggle ────────────────────────────────────────────
        let _sidebarOpen = true;
        function toggleSidebar()
        {
            _sidebarOpen = !_sidebarOpen;
            document.getElementById('sidebar').classList.toggle('collapsed', !_sidebarOpen);
            document.getElementById('main-area').classList.toggle('sidebar-collapsed', !_sidebarOpen);
            document.getElementById('btn-explorer').classList.toggle('active', _sidebarOpen);
        }

        // ── file tree (called by patched loadFiles in main.js) ────────
        function buildFileTree(files)
        {
            const tree = document.getElementById('file-tree');
            tree.innerHTML = '';
            files.forEach(f =>
            {
                const item = document.createElement('div');
                item.className = 'tree-item';
                item.dataset.file = f;
                item.innerHTML = `<span class="file-icon">${getFileIcon(f)}</span>` +
                    `<span class="file-name">${f}</span>` +
                    `<span class="dirty-dot"></span>`;
                item.addEventListener('click', () =>
                {
                    const sel = document.getElementById('fileList');
                    sel.value = f;
                    onFileSelect();
                    if (!_panelPinned) toggleSidebar();
                });
                tree.appendChild(item);
            });
        }

        // ── called by patched onFileSelect in main.js ─────────────────
        function setActiveTree(file)
        {
            document.querySelectorAll('.tree-item').forEach(el =>
                el.classList.toggle('active', el.dataset.file === file));
        }

        // ── tabs (called by patched onFileSelect in main.js) ──────────
        function ensureTab(file)
        {
            const list = document.getElementById('tabs-list');
            // One file at a time — replace whatever tab is open
            list.innerHTML = '';
            const tab = document.createElement('div');
            tab.className = 'tab active';
            tab.dataset.tab = file;
            tab.innerHTML = `<span class="tab-icon">${getFileIcon(file)}</span>` +
                `<span class="tab-name">${file}</span>` +
                `<span class="tab-dirty"></span>`;
            list.appendChild(tab);
        }

        // ── dirty dot on tabs + tree ──────────────────────────────────
        function setTabDirty(file, dirty)
        {
            const tab = document.querySelector(`.tab[data-tab="${CSS.escape(file)}"]`);
            if (tab) tab.classList.toggle('dirty', dirty);
            const ti = document.querySelector(`.tree-item[data-file="${CSS.escape(file)}"]`);
            if (ti) ti.classList.toggle('dirty', dirty);
        }

        // ── find — delegate fully to Monaco's built-in Ctrl+F widget ──
        function openFind()
        {
            if (_monacoEditor) _monacoEditor.getAction('actions.find').run();
        }
        function closeFind()
        {
            if (_monacoEditor) _monacoEditor.focus();
        }
        function findNext()
        {
            if (_monacoEditor) _monacoEditor.getAction('editor.action.nextMatchFindAction')?.run();
        }
        function findPrev()
        {
            if (_monacoEditor) _monacoEditor.getAction('editor.action.previousMatchFindAction')?.run();
        }

        // Ctrl+F → Monaco find (Monaco intercepts it when focused; this catches edge cases)
        document.addEventListener('keydown', e =>
        {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f')
            {
                e.preventDefault();
                openFind();
            }
        });

        // ── jumpToLine — override server.js with Monaco ───────────────
        function jumpToLine(lineNumber)
        {
            if (!_monacoEditor) return;
            _monacoEditor.revealLineInCenter(lineNumber);
            _monacoEditor.setPosition({ lineNumber, column: 1 });
            _monacoEditor.focus();
        }

        (function ()
        {
            const handle = document.getElementById('resize-handle');
            const panel = document.getElementById('panel');
            if (!handle || !panel) return;
            handle.addEventListener('mousedown', e =>
            {
                e.preventDefault();
                const startY = e.clientY, startH = panel.offsetHeight;
                const onMove = e =>
                {
                    panel.style.flex = 'none';
                    panel.style.height = Math.max(50, startH + startY - e.clientY) + 'px';
                    if (_monacoEditor) _monacoEditor.layout();
                };
                const onUp = () =>
                {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        })();

    </script>
</body>
